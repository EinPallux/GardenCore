  broadcast: "&#a8ff78&l✦ &e{player} &7has reached &a&lLevel {level}&7!"

# ── Events ─────────────────────────────────────
events:
  start:          "&#FFD700&l⚡ Event Started! &e{event} &7is now active!"
  end:            "&#FF6B6B&l✦ Event Ended! &7The &e{event} &7event has concluded."
  bossbar-none:   "&#a8ff78Current Event: &fNone"
  bossbar-active: "&#FFD700⚡ Event: &f{event} &7| &eEnds in: &f{time}s"

# ── Crops ──────────────────────────────────────
crop:
  level-required: "&cYou need Level &e{level} &cto farm &e{crop}&c!"

# ── Research ───────────────────────────────────
research:
  started:           "&#FFD700Research started! &7Come back in &f{time}&7."
  completed:         "&#a8ff78Research complete! &7New bonuses: &f+{fiber_multi}x Fiber &7and &f+{material_multi}x Material&7."
  cancelled:         "&#ff7a7aResearch cancelled."
