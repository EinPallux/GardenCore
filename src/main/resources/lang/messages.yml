  reset-fiber:      "&7Fiber for &e{player} &7has been reset."
  reset-all:        "&7All data for &e{player} &7has been reset."

# ── Leveling ───────────────────────────────────
level:
  level-up: "&#a8ff78&l✦ Level Up! &7You reached &a&lLevel {level}&7!"
