  already-completed: "&#ff7a7aYou have already completed this research."
  locked:            "&#ff7a7aComplete the previous research first."
  not-enough-fiber:  "&cYou need &e{cost} Fiber &cto start this. You only have &e{balance}&c."

# ── Islands ────────────────────────────────────
islands:
  level-required: "&cYou need Level &e{level} &cto travel to this island!"

# ── Elder Council ──────────────────────────────
elder:
  purchased:            "&#d4a8ff&l⚗ Elder Perk! &7{perk} is now level &d{level}&7! Total bonus: &#a8ff78+{bonus}x&7."
