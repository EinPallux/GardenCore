# ── Fiber ──────────────────────────────────────
fiber:
  set:  "&7Fiber for &e{player} &7set to &a{amount}&7."
  give: "&7Given &a{amount} &7Fiber to &e{player}&7."
  take: "&7Taken &a{amount} &7Fiber from &e{player}&7."
