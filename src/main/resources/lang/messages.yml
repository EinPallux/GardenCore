  not-enough-fiber:     "&cYou don't have enough Fiber for this perk!"
  not-enough-driftwood: "&cYou don't have enough Driftwood for this perk!"
  not-enough-moss:      "&cYou don't have enough Moss for this perk!"
  not-enough-reed:      "&cYou don't have enough Reed for this perk!"
  not-enough-clover:    "&cYou don't have enough Clover for this perk!"

# ── Boss Encounters ────────────────────────────
boss:
  spawned:  "&#FF6B6B&l⚔ Boss Spawned! &7{boss} &7has emerged in &e{island}&7! You have &e{duration} minutes &7to defeat it!"
  defeated: "&#a8ff78&l⚔ Boss Defeated! &7{boss} &7in &e{island} &7has been slain! &aRewards granted to all participants."
  expired:  "&#FF6B6B&l⚔ Boss Escaped! &7{boss} &7in &e{island} &7has vanished. &cNo rewards given."
  bossbar:        "&#FF6B6B⚔ {boss} &8| &c{hp} &7/ {max_hp} HP &8| &e{time}s remaining"
  hologram-health: "{boss}\n&#FF6B6B❤ &7{hp} &8/ {max_hp}"

# ── Composters ─────────────────────────────────
composter:
  placed:  "&#a8ff78&l✦ Lucky Composter placed! &7{type} &7is active for &f{duration} minutes &7in a &f{radius} block radius&7."
  removed: "&#ff7a7aComposter removed."

