# Main (config.yml) Config - Plugin made by Pallux @ BBB ( https://builtbybit.com/members/pallux.34066/ )
# ──────────────────────────────────────────────

# Prefix shown before every plugin message.
prefix: "&#28CA75&lG&#2BC66B&lA&#2EC262&lR&#31BD58&lD&#34B94F&lE&#37B545&lN &7➠&r"

# ── Features ───────────────────────────────────
features:
  no-drop: true
  no-fall-damage: true
  no-hunger: true
  no-block-drops: true
  no-non-crop-break: true
  command-blocking: true
  instant-replant: true
  alias-commands: true
  crop-farming: true
  material-drops: true
  multipliers: true
  upgrades: true
  events: true
  composters: true

# ── Events ─────────────────────────────────────
events:
  interval-minutes: 30
  duration-minutes: 5