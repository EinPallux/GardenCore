# Pets Config - Plugin made by Pallux @ BBB ( https://builtbybit.com/members/pallux.34066/ )
# ──────────────────────────────────────────────
# Lore placeholders:
#   pet-lore:      {rarity}, {fiber_bonus}
#   overview-lore rarity-line: {rarity}, {chance}, {fiber_bonus}
#   broadcast-message: {player}, {rarity}, {chance}
#
# cosmetic.material:     Any Minecraft material name.
#                        Use PLAYER_HEAD to display a custom skull texture.
# cosmetic.skull-texture: Base64 skin value (only applies when material is PLAYER_HEAD).
#   Grab values from https://minecraft-heads.com — click a head → "Value" field.
#   Leave blank for a plain Steve head.
# ──────────────────────────────────────────────

pets:

  gui-title: "&8Pets Menu"
  gui-size: 27

  filler:
    material: GRAY_STAINED_GLASS_PANE

  # ── Current pet ────────────────────────────────
  pet-slot: 11
  pet-name: "{rarity} &7Pet"
  pet-lore:
    - ""
    - "&7Rarity: {rarity}"
    - "&7Fiber Bonus: &#FFD700+{fiber_bonus}x"
    - ""
    - "&7This is your best pet and is"
    - "&7automatically equipped."

  no-pet-material: BARRIER
  no-pet-name: "&7No Pet Found"
  no-pet-lore:
    - ""
    - "&7You haven't found a pet yet."
    - "&7Break crops for a chance to find one!"

  # ── Overview item ──────────────────────────────
  overview-slot: 15
  overview-material: DRAGON_EGG
  overview-name: "&#d4a8ff&l✦ Pet Overview"
  overview-lore:
    - ""
    - "&7Break any crop for a chance to find a pet."
    - "&7Higher rarity pets replace lower ones."
    - ""
    - "&8─── Pet Rarities & Chances ───"
    - "rarity-line: {rarity} &8| &71/{chance} &8| &#FFD700+{fiber_bonus}x Fiber"
    - ""
    - "&8Once you reach a rarity tier you can"
    - "&8no longer find pets of lower tiers."

  # Set to "" to disable broadcast
  broadcast-message: "&5&l✦ {player} &7found a {rarity} &7Pet! &8({chance} chance)"

  # ── Rarities ───────────────────────────────────
