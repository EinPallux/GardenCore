# ──────────────────────────────────────────────
# Create short command aliases that run another command.
# The alias is registered as a real slash-command.
#
# Format:
#   <alias>:
#     command: "<command to run, without leading />"
#
# Example — typing /afk runs /warp afk:
#   afk:
#     command: "warp afk"
