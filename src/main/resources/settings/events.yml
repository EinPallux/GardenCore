# Events Config - Plugin made by Pallux @ BBB ( https://builtbybit.com/members/pallux.34066/ )
# ──────────────────────────────────────────────
# Events give all online players a temporary bonus.
# They start automatically on a timer (see config.yml) or manually
# via /gca event start <key>, or by using an Event Ticket item.
#
# Per event:
#   display-name: Shown in boss bar and broadcast messages
#   type:         One of: FIBER_AMOUNT | MATERIAL_AMOUNT | MATERIAL_CHANCE | XP_AMOUNT
#   value:        Bonus added as a percentage of the base multiplier
#                 e.g. value: 50 on FIBER_AMOUNT adds +50% to the fiber multiplier
# ──────────────────────────────────────────────

events:

  # ── Fiber Amount ───────────────────────────────
  fiber_5:
    display-name: "&#FFD700+5% Fiber Amount"
    type: FIBER_AMOUNT
    value: 5.0

  fiber_10:
    display-name: "&#FFD700+10% Fiber Amount"
    type: FIBER_AMOUNT
    value: 10.0

  fiber_25:
    display-name: "&#FFD700+25% Fiber Amount"
    type: FIBER_AMOUNT
    value: 25.0

  fiber_50:
    display-name: "&#FFD700+50% Fiber Amount"
    type: FIBER_AMOUNT
    value: 50.0

  # ── Material Amount ────────────────────────────
  material_amount_5:
    display-name: "&#a8ff78+5% Material Amount"
    type: MATERIAL_AMOUNT
    value: 5.0

  material_amount_10:
    display-name: "&#a8ff78+10% Material Amount"
    type: MATERIAL_AMOUNT
    value: 10.0

  material_amount_25:
    display-name: "&#a8ff78+25% Material Amount"
    type: MATERIAL_AMOUNT
    value: 25.0

  # ── Material Chance ────────────────────────────
  material_chance_025:
    display-name: "&#78c8ff+0.25% Material Chance"
    type: MATERIAL_CHANCE
    value: 0.25

  material_chance_05:
    display-name: "&#78c8ff+0.5% Material Chance"
    type: MATERIAL_CHANCE
    value: 0.5

  # ── XP ────────────────────────────────────────
  xp_10:
    display-name: "&#a8d8ff+10% XP"
    type: XP_AMOUNT
    value: 10.0

  xp_25:
    display-name: "&#a8d8ff+25% XP"
    type: XP_AMOUNT
    value: 25.0

  xp_50:
    display-name: "&#a8d8ff+50% XP"
    type: XP_AMOUNT
    value: 50.0