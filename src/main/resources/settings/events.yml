# Events Config - Plugin made by Pallux @ BBB ( https://builtbybit.com/members/pallux.34066/ )
# ──────────────────────────────────────────────
# Events give all online players a temporary bonus.
# They start automatically on a timer (see config.yml) or manually
# via /gca event start <key>, or by using an Event Ticket item.
#
# Per event:
#   display-name: Shown in boss bar and broadcast messages
#   type:         One of: FIBER_AMOUNT | MATERIAL_AMOUNT | MATERIAL_CHANCE | XP_AMOUNT
#   value:        Bonus added as a percentage of the base multiplier
#                 e.g. value: 50 on FIBER_AMOUNT adds +50% to the fiber multiplier
# ──────────────────────────────────────────────

events:

  # ── Fiber Amount ───────────────────────────────
  fiber_50:
    display-name: "&#FFD700+50% Fiber Amount"
    type: FIBER_AMOUNT
    value: 50.0

  fiber_100:
    display-name: "&#FFD700+100% Fiber Amount"
    type: FIBER_AMOUNT
    value: 100.0

  fiber_250:
    display-name: "&#FFD700+250% Fiber Amount"
    type: FIBER_AMOUNT
    value: 250.0

  fiber_500:
    display-name: "&#FFD700+500% Fiber Amount"
    type: FIBER_AMOUNT
    value: 500.0

  # ── Material Amount ────────────────────────────
  material_amount_20:
    display-name: "&#a8ff78+20% Material Amount"
    type: MATERIAL_AMOUNT
    value: 20.0

  material_amount_75:
    display-name: "&#a8ff78+75% Material Amount"
    type: MATERIAL_AMOUNT
    value: 75.0

  material_amount_150:
    display-name: "&#a8ff78+150% Material Amount"
    type: MATERIAL_AMOUNT
    value: 150.0

  # ── Material Chance ────────────────────────────
  material_chance_10:
    display-name: "&#78c8ff+10% Material Chance"
    type: MATERIAL_CHANCE
    value: 10.0

  material_chance_25:
    display-name: "&#78c8ff+25% Material Chance"
    type: MATERIAL_CHANCE
    value: 25.0

  # ── XP ────────────────────────────────────────
  xp_50:
    display-name: "&#a8d8ff+50% XP"
    type: XP_AMOUNT
    value: 50.0

  xp_100:
    display-name: "&#a8d8ff+100% XP"
    type: XP_AMOUNT
    value: 100.0

  xp_250:
    display-name: "&#a8d8ff+250% XP"
    type: XP_AMOUNT
    value: 250.0