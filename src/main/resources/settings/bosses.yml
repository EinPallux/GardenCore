# Bosses Config - Plugin made by Pallux @ BBB ( https://builtbybit.com/members/pallux.34066/ )
# ──────────────────────────────────────────────
# Bosses spawn automatically every <spawn-interval-minutes> minutes.
# Each boss is tied to an island zone set via /gca boss set <key>.
#
# Per boss:
#   display-name:      Name shown in boss bar, hologram and chat
#   island-key:        Identifier for the island (used in messages)
#   skull-texture:     Base64 skin value for the giant player-head appearance
#                      Grab from https://minecraft-heads.com → "Value" field
#   size:              Scale of the ArmorStand (1.0 = normal, 3.0 = 3x bigger)
#                      Note: Paper 1.21 supports ArmorStand scale via attributes
#   max-health:        Total HP the boss has
#   duration-seconds:  How long the boss stays alive if not killed
#   reward-command:    Console command run for EACH player who dealt damage
#                      when the boss is defeated. Use %player% for the name
#                      and %damage% for the total damage that player dealt.
#
# Zone boundaries are set in-game with:
#   /gca boss set <key>   (requires a WorldEdit / FAWE cuboid selection)
# They are stored automatically under each boss's zone: block below.
# ──────────────────────────────────────────────

# How often a boss cycle runs (one boss per zone, staggered 1 min apart)
spawn-interval-minutes: 30

