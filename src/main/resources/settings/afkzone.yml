# ──────────────────────────────────────────────
#  GardenCore  —  AFK Zone
# ──────────────────────────────────────────────
# Players standing inside the AFK zone earn a reward
# on a fixed interval. Set the zone in-game with:
#   /gca afkzone set  (requires a WorldEdit selection)
# ──────────────────────────────────────────────

afkzone:
  enabled: true

  # Seconds between each reward payout
  reward-interval: 60

  # Console command executed each time a reward is paid out.
  # Use %player% as a placeholder for the player's name.
  reward-command: "gems give %player% 1"

  # On-screen title while the player is inside the zone.
  # {time} = seconds until the next reward.
  title:    "&#a8ff78&lAFK Zone"
  subtitle: "&7Next Reward in: &#a8ff78{time}s"

  # Action bar flashes on zone enter / leave.
  actionbar-enter: "&#a8ff78✦ Entered the AFK Zone"
  actionbar-leave: "&#ff7a7a✦ Left the AFK Zone"

  # Zone boundaries — set automatically by /gca afkzone set.
  # You can also fill these in manually if you prefer.
  zone:
    world: ""
    min-x: 0
    min-y: 0
    min-z: 0
    max-x: 0
    max-y: 0
    max-z: 0