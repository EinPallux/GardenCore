# ──────────────────────────────────────────────
#  GardenCore  —  Crops
# ──────────────────────────────────────────────
# Each crop entry requires:
#   material:       Minecraft block material name
#   display-name:   Name shown in messages
#   fiber:          Base fiber earned per break (multiplied by the player's fiber multiplier)
#   xp:             Base XP earned per break (multiplied by the player's XP multiplier)
#   level-required: Minimum player level needed to farm this crop
#
# replant-delay: How long (in seconds) before a broken crop respawns.
#   The Crop Cooldown upgrade also applies a separate per-player harvest cooldown.
# ──────────────────────────────────────────────

