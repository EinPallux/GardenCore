# GardenCore Crops Configuration
#
# ── Philosophy ────────────────────────────────────────────────────────────────
# Base fiber values are intentionally SMALL. The multiplier systems
# (Upgrades, Research, Elder) are what drive fiber numbers into the millions.
# This means every upgrade feels like a massive power spike on the title screen.
#
# crop-cooldown: BASE respawn time in seconds.
#   Crop Cooldown upgrade reduces this by 0.1s/level → minimum 0.2s (8 levels).
crop-cooldown: 1.0
#
# ── Progression table ────────────────────────────────────────────────────────
#  Stage        Level   Crop             Base   ×Multi  Fiber/break
#  Early        1-10    Grass/Fern       1-2    ×1          ~1-2
#  Mid-early    10-75   Dead Bush        5      ×50         ~250
#  Mid          75-200  Tulips           15     ×500        ~7,500
#  Late         200-400 Nether roots     40     ×5,000      ~200,000
#  Very late    400-1000 Coral           100    ×50,000     ~5,000,000
#  End game     1000+   Firefly Bush     250    ×27,351     ~6,837,750
# ─────────────────────────────────────────────────────────────────────────────

