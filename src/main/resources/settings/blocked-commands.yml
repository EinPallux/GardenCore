# Blocked Commands Config - Plugin made by Pallux @ BBB ( https://builtbybit.com/members/pallux.34066/ )
# ──────────────────────────────────────────────
# Players without gc.admin will be denied from running
# any command listed here. The check is case-insensitive
# and also matches commands with a namespace prefix
# (e.g. "plugins" will also block "bukkit:plugins").
#
# Add commands WITHOUT a leading slash.
# Bypass permission: gc.admin
# Deny message: configured in lang/messages.yml → command-blocked
# ──────────────────────────────────────────────

blocked-commands:

  # ── Plugin / server info ───────────────────────
  - plugins
  - pl
  - bukkit:plugins
  - bukkit:pl
  - version
  - ver
  - bukkit:version
  - bukkit:ver
  - about

  # ── Timings / profiling ────────────────────────
  - timings
  - tps
  - mspt
  - lag

  # ── Paper / Spigot internals ───────────────────
  - paper
  - spigot
  - craftbukkit:version
  - stop
  - restart
  - reload
  - rl
  - bukkit:reload
  - op
  - deop