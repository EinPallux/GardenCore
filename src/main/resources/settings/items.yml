  # ── Composter Items ────────────────────────────
  # Place these COMPOSTER blocks to activate a local area buff.
  # These are NOT event tickets — they do not use the events system.
  # duration-seconds: How long this composter stays active after placement.
  # radius:           Block radius in which players receive the buff.
  # Placing the block consumes the item and activates the buff directly.

  composter_fiber_100:
    name: "&#FFD700&l✦ Lucky Composter &8— &e+100% Fiber"
