# Items Config - Plugin made by Pallux @ BBB ( https://builtbybit.com/members/pallux.34066/ )
# ──────────────────────────────────────────────
# Custom items are given via /gca item give <key> <player> [amount].
# Right-clicking the item executes a console command.
#
# Per item:
#   name:             Display name (color codes supported)
#   material:         Minecraft material name
#   lore:             List of lore lines (color codes supported)
#   command:          Console command to run. Use %player% for the player's name.
#                     Special: "gca event start <event-key>" starts an event directly.
#                     Omit or leave blank for items with no right-click command.
#   duration-seconds: (Composter items only) How long the placed composter stays
#                     active before despawning.
#   radius:           (Composter items only) Block radius in which players receive
#                     the buff from this composter.
#
# Composter items use material: COMPOSTER and have no command.
# Placing the composter block consumes the item and activates the buff.
# ──────────────────────────────────────────────

