name: GardenCore
version: '${project.version}'
main: com.pallux.gardencore.GardenCore
api-version: '1.21'
description: Core plugin for Garden Simulator Tycoon Server by Pallux
authors: [ Pallux ]
softdepend: [ PlaceholderAPI, WorldEdit, FastAsyncWorldEdit ]

permissions:
  gc.admin:
    description: Access to admin commands
    default: op
  gc.player:
    description: Access to player commands
    default: true
  gc.bypass.nodrop:
    description: Bypass the no-drop feature
    default: op
  gc.bypass.nofalldamage:
    description: Bypass the no-fall-damage feature
    default: op
  gc.bypass.nohunger:
    description: Bypass the no-hunger feature
    default: op
  gc.bypass.noblockdrops:
    description: Bypass the no-block-drops feature
    default: op
  gc.bypass.instantreplant:
    description: Bypass the instant-replant feature
    default: op
  gc.bypass.noncropsbreak:
    description: Bypass the no-non-crop-break feature (allows breaking any block)
    default: op

  # ── Donor / Premium Rank Multiplier Bonuses ───────────────────────────────
  # Grant these permissions to a rank or player to give them a percentage
  # bonus on top of all in-game multipliers. Replace XXX with any whole or
  # decimal number (e.g. 10, 25, 50, 100).
  #
  # Multiple nodes of the same type stack additively.
  # Examples:
  #   gc.multi.fiber_amount.donor.50     → +50% Fiber Amount multiplier
  #   gc.multi.material_amount.donor.25  → +25% Material Amount multiplier
  #   gc.multi.xp.donor.100             → +100% XP multiplier
  #   gc.multi.material_chance.donor.10  → +10% Material Chance multiplier

  gc.multi.fiber_amount.donor.10:
    description: "+10% bonus to the Fiber Amount multiplier"
    default: false
  gc.multi.fiber_amount.donor.25:
    description: "+25% bonus to the Fiber Amount multiplier"
    default: false
  gc.multi.fiber_amount.donor.50:
    description: "+50% bonus to the Fiber Amount multiplier"
    default: false
  gc.multi.fiber_amount.donor.100:
    description: "+100% bonus to the Fiber Amount multiplier"
    default: false

  gc.multi.material_amount.donor.10:
    description: "+10% bonus to the Material Amount multiplier"
    default: false
  gc.multi.material_amount.donor.25:
    description: "+25% bonus to the Material Amount multiplier"
    default: false
  gc.multi.material_amount.donor.50:
    description: "+50% bonus to the Material Amount multiplier"
    default: false
  gc.multi.material_amount.donor.100:
    description: "+100% bonus to the Material Amount multiplier"
    default: false

  gc.multi.xp.donor.10:
    description: "+10% bonus to the XP multiplier"
    default: false
  gc.multi.xp.donor.25:
    description: "+25% bonus to the XP multiplier"
    default: false
  gc.multi.xp.donor.50:
    description: "+50% bonus to the XP multiplier"
    default: false
  gc.multi.xp.donor.100:
    description: "+100% bonus to the XP multiplier"
    default: false

  gc.multi.material_chance.donor.10:
    description: "+10% bonus to the Material Chance multiplier"
    default: false
  gc.multi.material_chance.donor.25:
    description: "+25% bonus to the Material Chance multiplier"
    default: false
  gc.multi.material_chance.donor.50:
    description: "+50% bonus to the Material Chance multiplier"
    default: false
  gc.multi.material_chance.donor.100:
    description: "+100% bonus to the Material Chance multiplier"
    default: false

commands:
  upgrade:
    description: Open the upgrade GUI or upgrade a specific perk
    usage: /upgrade [fiber_amount|material_amount|material_chance]
    permission: gc.player
  gca:
    description: GardenCore admin commands
    usage: /gca <subcommand>
    permission: gc.admin
  research:
    description: Open the Research GUI
    usage: /research
    permission: gc.player
  garden:
    description: Open the Garden main menu
    usage: /garden
    permission: gc.player
  islands:
    description: Open the Island travel menu
    usage: /islands
    permission: gc.player
  elder:
    description: Open the Elder Council perk menu
    usage: /elder
    permission: gc.player
  pets:
    description: Open the Pets menu
    usage: /pets
    permission: gc.player