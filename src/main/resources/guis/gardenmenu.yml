# ──────────────────────────────────────────────
#  GardenCore  —  Garden Main Menu  (/garden)
# ──────────────────────────────────────────────
# Player-head lore placeholders:
#   {player}               Player name
#   {level}                Player level
#   {xp}                   XP progress as a percentage
#   {fiber}                Formatted fiber balance
#   {multi_fiber}          Total fiber multiplier
#   {multi_material}       Total material amount multiplier
#   {multi_material_chance} Total material chance multiplier
#   {upgrade_fiber}        Fiber Amount upgrade level
#   {upgrade_material}     Material Amount upgrade level
#   {upgrade_material_chance} Material Chance upgrade level
#   {upgrade_cooldown}     Crop Cooldown upgrade level
#   {research_completed}   Number of completed researches
#   {research_active}      Active research name + time remaining, or "None"
#   {driftwood} {moss} {reed} {clover}  Material balances
#
# Button commands run as the player (without leading /).
# Use {player} in the command string if needed.
# ──────────────────────────────────────────────

garden-menu:
  title: "&8Garden Menu"
  size: 54

  filler:
    material: GRAY_STAINED_GLASS_PANE

  player-head:
    slot: 4
    name: "&#a8ff78&l{player}'s Stats"
    lore:
      - ""
      - "&8─── Economy ───"
      - "&7Fiber: &#FFD700{fiber}"
      - ""
      - "&8─── Progress ───"
      - "&7Level: &#a8ff78{level}"
      - "&7XP:    &f{xp}"
      - ""
      - "&8─── Multipliers ───"
      - "&7Fiber Amount:     &#FFD700{multi_fiber}"
      - "&7Material Amount:  &#a8ff78{multi_material}"
      - "&7Material Chance:  &#78c8ff{multi_material_chance}"
      - ""
      - "&8─── Research ───"
      - "&7Completed: &#a8ff78{research_completed}"
      - "&7Active:    &f{research_active}"
      - ""
      - "&8─── Materials ───"
      - "&7Driftwood: &f{driftwood}"
      - "&7Moss:      &f{moss}"
      - "&7Reed:      &f{reed}"
      - "&7Clover:    &f{clover}"

  buttons:
    upgrades:
      slot: 19
      material: TALL_GRASS
      name: "&#FFD700&lUpgrades"
      command: "upgrade"
      lore:
        - "&7Purchase upgrades to increase"
        - "&7your fiber and material gains."
        - ""
        - "&eClick to open!"

    research:
      slot: 20
      material: CLOCK
      name: "&#a8ff78&lResearch"
      command: "research"
      lore:
        - "&7Unlock permanent multiplier"
        - "&7bonuses through research."
        - ""
        - "&eClick to open!"

    elder:
      slot: 21
      material: TOTEM_OF_UNDYING
      name: "&#d4a8ff&lElder Council"
      command: "elder"
      lore:
        - "&7Spend materials and fiber on"
        - "&7powerful permanent perks."
        - ""
        - "&eClick to open!"

    pets:
      slot: 22
      material: DRAGON_EGG
      name: "&5&lPets"
      command: "pets"
      lore:
        - "&7Gotta catch em all?"
        - "&7Pets boost your Fiber Multi."
        - ""
        - "&eClick to open!"

    islands:
      slot: 34
      material: GRASS_BLOCK
      name: "&a&lIslands"
      command: "islands"
      lore:
        - "&7Travel to different islands"
        - "&7to farm better crops."
        - ""
        - "&eClick to open!"

  # Placeholder items (shown as "???" for future features)
  placeholder-item:
    material: GRAY_DYE
    name: "&8???"
    lore: []

  placeholders:
    - slot: 23
    - slot: 24
    - slot: 25
    - slot: 28
    - slot: 29
    - slot: 30
    - slot: 31
    - slot: 32
    - slot: 33

  close-button:
    slot: 49
    material: BARRIER
    name: "&#ff7a7a&lClose"
    lore:
      - "&7Click to close."