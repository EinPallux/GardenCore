# GardenCore Island Menu Configuration
# Color codes: &a, &c, &#FFFFFF etc.
#
# Each island button supports:
#   slot:            Inventory slot (0–26 for a 27-slot GUI)
#   material:        Material shown when the island is UNLOCKED
#   locked-material: (optional) Override the root locked-material for this button only
#   name:            Display name when unlocked (color codes supported)
#   lore:            Lore lines when unlocked. Placeholder: {level_required}
#   command:         Command executed AS the player on click (without leading /)
#   level-required:  Minimum player level needed to travel here
#
# Root-level locked display settings apply to ALL locked buttons unless overridden:
#   locked-material: Material used for every locked button
#   locked-name:     Name template — {name} is replaced with the island's display name (stripped of color)
#   locked-lore:     Lore lines for locked buttons. Placeholder: {level_required}

island-menu:
  title: "&8Island Menu"
  size: 27

  filler:
    material: GRAY_STAINED_GLASS_PANE

  # Default appearance for locked island buttons
  locked-material: BLACK_STAINED_GLASS_PANE
  locked-name: "&#ff7a7a&l{name} &7[Locked]"
  locked-lore:
    - ""
    - "&#ff7a7a✖ Requires Level {level_required}"
    - "&7Keep farming to unlock this island!"

  # ── Island buttons ──────────────────────────────────────────
  islands:
    plains:
      slot: 10
      material: LIME_STAINED_GLASS_PANE
      name: "&#a8ff78&lPlains"
      lore:
        - ""
        - "&7A peaceful meadow filled"
        - "&7with grasses and flowers."
        - ""
        - "&7Required Level: &#a8ff78{level_required}"
        - ""
        - "&#a8ff78▶ Click to travel!"
      command: "warp plains"
      level-required: 1

    savanna:
      slot: 11
      material: YELLOW_STAINED_GLASS_PANE
      name: "&#FFD700&lSavanna"
      lore:
        - ""
        - "&7A dry, golden savanna"
        - "&7teeming with tough plants."
        - ""
        - "&7Required Level: &#FFD700{level_required}"
        - ""
        - "&#FFD700▶ Click to travel!"
      command: "warp savanna"
      level-required: 10

    flowerfield:
      slot: 12
      material: PINK_STAINED_GLASS_PANE
      name: "&#FFB6C1&lFlower Field"
      lore:
        - ""
        - "&7A colourful field bursting"
        - "&7with rare blooms."
        - ""
        - "&7Required Level: &#FFB6C1{level_required}"
        - ""
        - "&#FFB6C1▶ Click to travel!"
      command: "warp flowerfield"
      level-required: 75

    netherforest:
      slot: 13
      material: RED_STAINED_GLASS_PANE
      name: "&#FF6B6B&lNether Forest"
      lore:
        - ""
        - "&7A blazing nether forest"
        - "&7with all kinds of fungi."
        - ""
        - "&7Required Level: &#FF6B6B{level_required}"
        - ""
        - "&#FF6B6B▶ Click to travel!"
      command: "warp netherforest"
      level-required: 200

    coralreef:
      slot: 14
      material: BLUE_STAINED_GLASS_PANE
      name: "&#C4A882&lCoral Reef"
      lore:
        - ""
        - "&7A vibrant underwater reef"
        - "&7brimming with rare coral."
        - ""
        - "&7Required Level: &#C4A882{level_required}"
        - ""
        - "&#C4A882▶ Click to travel!"
      command: "warp coralreef"
      level-required: 400

    mysticforest:
      slot: 15
      material: BROWN_STAINED_GLASS_PANE
      name: "&#78c8ff&lMystic Forest"
      lore:
        - ""
        - "&7A mysterious glowing crop"
        - "&7what could it hide?"
        - ""
        - "&7Required Level: &#78c8ff{level_required}"
        - ""
        - "&#78c8ff▶ Click to travel!"
      command: "warp mysticforest"
      level-required: 1000

  # ── Placeholder slots (gray dye = coming soon) ──────────────
  placeholders:
    - slot: 16

  placeholder-item:
    material: GRAY_DYE
    name: "&8???"
    lore: []

  # ── Close button ─────────────────────────────────────────────
  close-button:
    slot: 22
    material: BARRIER
    name: "&#ff7a7a&lClose Menu"
    lore:
      - "&7Click to close this menu."