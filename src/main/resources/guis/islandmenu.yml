# ──────────────────────────────────────────────
#  GardenCore  —  Island Menu  (/islands)
# ──────────────────────────────────────────────
# Each island button teleports a player to a warp (or runs any command).
# Locked islands show a different appearance until the player meets the
# required level.
#
# Per island:
#   slot:           Inventory slot
#   material:       Item shown when the island is unlocked
#   name:           Display name when unlocked
#   lore:           Lore when unlocked. Placeholder: {level_required}
#   command:        Command run as the player on click (no leading /)
#   level-required: Minimum player level to use this island
#
# Root-level locked settings apply to all locked buttons:
#   locked-material: Item shown when locked
#   locked-name:     Name template — {name} is replaced with the island's name
#   locked-lore:     Lore when locked. Placeholder: {level_required}
# ──────────────────────────────────────────────

island-menu:
  title: "&8Island Menu"
  size: 27

  filler:
    material: GRAY_STAINED_GLASS_PANE

  locked-material: BLACK_STAINED_GLASS_PANE
  locked-name: "&#ff7a7a&l{name} &7[Locked]"
