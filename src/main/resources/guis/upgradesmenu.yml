# GardenCore GUI Configuration
# All names, lores, materials and slots are fully editable.
# Placeholders available in lore/name: {level}, {max_level}, {cost}, {value}
# Color codes: &a, &c, &#FFFFFF etc.

upgrade-gui:
  title: "&8Upgrades Menu"
  size: 27
  filler:
    enabled: true
    material: GRAY_STAINED_GLASS_PANE

  upgrades:
    crop_cooldown:
      slot: 10
      material: CLOCK
      name: "&#FF6B6B&lCrop Cooldown"
      lore:
        - "&7Level: &e{level}&7/&e{max_level}"
        - "&7Current Cooldown: &a{value}s"
        - "&7Cost: &e{cost} &7Fiber"
        - ""
        - "&aClick to upgrade!"

    fiber_amount:
      slot: 12
      material: WHEAT
      name: "&#FFD700&lFiber Amount"
      lore:
        - "&7Level: &e{level}&7/&e{max_level}"
        - "&7Multiplier: &a{value}"
        - "&7Cost: &e{cost} &7Fiber"
        - ""
        - "&aClick to upgrade!"

    material_amount:
      slot: 14
      material: MOSS_BLOCK
      name: "&#a8ff78&lMaterial Amount"
      lore:
        - "&7Level: &e{level}&7/&e{max_level}"
        - "&7Multiplier: &a{value}"
        - "&7Cost: &e{cost} &7Fiber"
        - ""
        - "&aClick to upgrade!"

    material_chance:
      slot: 16
      material: PITCHER_PLANT
      name: "&#78c8ff&lMaterial Chance"
      lore:
        - "&7Level: &e{level}&7/&e{max_level}"
        - "&7Multiplier: &a{value}"
        - "&7Cost: &e{cost} &7Fiber"
        - ""
        - "&aClick to upgrade!"