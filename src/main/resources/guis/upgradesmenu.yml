# ──────────────────────────────────────────────
#  GardenCore  —  Upgrades Menu
# ──────────────────────────────────────────────
# Lore placeholders:
#   {level}     Current upgrade level
#   {max_level} Maximum upgrade level
#   {cost}      Fiber cost for the next level
#   {value}     Current effective value (multiplier or cooldown)
# ──────────────────────────────────────────────

upgrade-gui:
  title: "&8Upgrades"
  size: 27

  filler:
    enabled: true
    material: GRAY_STAINED_GLASS_PANE

  upgrades:

    crop_cooldown:
      slot: 10
      material: CLOCK
      name: "&#FF6B6B&lCrop Cooldown"
      lore:
        - "&7Level: &e{level}&7/&e{max_level}"
        - "&7Current Cooldown: &a{value}s"
        - "&7Next Level Cost: &e{cost} Fiber"
        - ""
        - "&7Reduces harvest cooldown by &f0.1s &7per level."
        - "&7Base: &f1.0s &8→ &7Min: &f0.2s &8(8 levels)"
        - ""
        - "&aClick to upgrade!"

    fiber_amount:
      slot: 12
      material: WHEAT
      name: "&#FFD700&lFiber Amount"
      lore:
        - "&7Level: &e{level}&7/&e{max_level}"
        - "&7Multiplier: &a{value}"
        - "&7Next Level Cost: &e{cost} Fiber"
        - ""
        - "&7Adds &f+25x &7to your fiber multiplier per level."
        - "&8Max: +5,000x (200 levels)"
        - ""
        - "&aClick to upgrade!"

    material_amount:
      slot: 14
      material: MOSS_BLOCK
      name: "&#a8ff78&lMaterial Amount"
      lore:
        - "&7Level: &e{level}&7/&e{max_level}"
        - "&7Multiplier: &a{value}"
        - "&7Next Level Cost: &e{cost} Fiber"
        - ""
        - "&7Adds &f+0.15x &7to your material amount multiplier per level."
        - "&8Max: +15x (100 levels)"
        - ""
        - "&aClick to upgrade!"

    material_chance:
      slot: 16
      material: PITCHER_PLANT
      name: "&#78c8ff&lMaterial Chance"
      lore:
        - "&7Level: &e{level}&7/&e{max_level}"
        - "&7Multiplier: &a{value}"
        - "&7Next Level Cost: &e{cost} Fiber"
        - ""
        - "&7Adds &f+0.04x &7to your material drop chance per level."
        - "&8Max: +2x (50 levels)"
        - ""
        - "&aClick to upgrade!"