# GardenCore Elder Menu Configuration
# Follows the same structure as the other GUI config files.
#
# Perk slots in the 4-row GUI (36 slots, size: 36):
#   Fiber Amount    → slot 10
#   Material Amount → slot 12
#   XP Gain         → slot 14
#   Material Chance → slot 16
#
# Cost per level = base-cost + (currentLevel * cost-scale)
# Bonus per level is a raw multiplier value (e.g. 0.05 = +5% per level)

elder-menu:
  title: "&8Elder Menu"
  size: 36

  filler:
    material: GRAY_STAINED_GLASS_PANE

  # Top-row border material (row 0, slots 0-8)
  top-border:
    material: PURPLE_STAINED_GLASS_PANE

  # Side + bottom border material (sides rows 1-2, bottom row 3)
  border:
    material: BLACK_STAINED_GLASS_PANE

  # Totem header item — slot 4 (top-center)
  header:
    slot: 4
    material: TOTEM_OF_UNDYING
    name: "&#d4a8ff&l⚗ Elder Council"
    lore:
      - ""
      - "&7Spend &fMaterials &7and &fFiber"
      - "&7to unlock powerful permanent perks."

  # ── Perk items ─────────────────────────────────────────────
  # Placeholders: {perk}, {level}, {max_level}, {bonus}, {next_bonus}
  #               {fiber_cost}, {driftwood_cost}, {moss_cost}, {reed_cost}, {clover_cost}
  #               {has_fiber}, {has_driftwood}, {has_moss}, {has_reed}, {has_clover}
  #                 → {has_*} renders as &#a8ff78✔ or &#ff7a7a✘

  perk-name: "&#d4a8ff&l{perk}"
  perk-name-maxed: "&#d4a8ff&l{perk} &#a8ff78[MAX]"

  perk-lore:
    - ""
    - "&7Level: &#d4a8ff{level}&7/&#d4a8ff{max_level}"
    - "&7Current Bonus: &#a8ff78+{bonus}%"
    - "&7Next Level: &#FFD700+{next_bonus}%"
    - ""
    - "&8── Cost to upgrade ──"
    - "&7Fiber:     {has_fiber} &#FFD700{fiber_cost}"
    - "&7Driftwood: {has_driftwood} &#C4A882{driftwood_cost}"
    - "&7Moss:      {has_moss} &#5A8A3C{moss_cost}"
    - "&7Reed:      {has_reed} &#8BC34A{reed_cost}"
    - "&7Clover:    {has_clover} &#2E7D32{clover_cost}"
    - ""
    - "&#d4a8ff▶ Click to purchase!"

  perk-lore-maxed:
    - ""
    - "&7Level: &#a8ff78MAX"
    - "&7Total Bonus: &#a8ff78+{bonus}%"
    - ""
    - "&#a8ff78✔ Fully upgraded!"

  # ── Resource info item ─────────────────────────────────────
  info:
    slot: 31
    material: AMETHYST_SHARD
    name: "&#d4a8ff&lYour Resources"
    lore:
      - ""
      - "&7Fiber:     &#FFD700{fiber}"
      - "&7Driftwood: &#C4A882{driftwood}"
      - "&7Moss:      &#5A8A3C{moss}"
      - "&7Reed:      &#8BC34A{reed}"
      - "&7Clover:    &#2E7D32{clover}"

  # ── Close button ───────────────────────────────────────────
  close-button:
    slot: 35
    material: BARRIER
    name: "&#ff7a7a&lClose"
    lore:
      - "&7Click to close this menu."

  # ══════════════════════════════════════════════════════════
  # Perk definitions
  # ══════════════════════════════════════════════════════════

  perks:
    fiber_amount:
      slot: 10
      max-level: 50
      # Bonus per level as a multiplier (0.05 = +5% per level)
      bonus-per-level: 2.0
      # Cost = base + currentLevel * scale
      fiber-base-cost: 1000
      fiber-cost-scale: 500
      driftwood-base-cost: 5
      driftwood-cost-scale: 3
      moss-base-cost: 0
      moss-cost-scale: 0
      reed-base-cost: 0
      reed-cost-scale: 0
      clover-base-cost: 0
      clover-cost-scale: 0

    material_amount:
      slot: 12
      max-level: 50
      bonus-per-level: 0.5
      fiber-base-cost: 1000
      fiber-cost-scale: 500
      driftwood-base-cost: 50
      driftwood-cost-scale: 50
      moss-base-cost: 20
      moss-cost-scale: 20
      reed-base-cost: 10
      reed-cost-scale: 10
      clover-base-cost: 0
      clover-cost-scale: 0

    xp_gain:
      slot: 14
      max-level: 50
      bonus-per-level: 1.0
      fiber-base-cost: 800
      fiber-cost-scale: 400
      driftwood-base-cost: 50
      driftwood-cost-scale: 50
      moss-base-cost: 20
      moss-cost-scale: 20
      reed-base-cost: 15
      reed-cost-scale: 15
      clover-base-cost: 10
      clover-cost-scale: 10

    material_chance:
      slot: 16
      max-level: 1
      bonus-per-level: 0.1
      fiber-base-cost: 50000
      fiber-cost-scale: 50000
      driftwood-base-cost: 1000
      driftwood-cost-scale: 3
      moss-base-cost: 500
      moss-cost-scale: 3
      reed-base-cost: 250
      reed-cost-scale: 2
      clover-base-cost: 125
      clover-cost-scale: 1