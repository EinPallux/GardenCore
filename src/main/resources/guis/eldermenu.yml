# GardenCore Elder Menu Configuration
#
# ── Philosophy ────────────────────────────────────────────────────────────────
# Elder is the long-term endgame grind. Each level gives a flat, readable
# bonus that players immediately understand. The cost curve grows steeply
# so maxing Elder takes hundreds of hours — it is THE prestige goal.
#
# ── fiber_amount: 200 levels, flat +100x per level ───────────────────────────
#   Every single level adds exactly +100x to the fiber multiplier.
#   L1: +100x  L10: +1,000x  L50: +5,000x  L100: +10,000x  L200: +20,000x
#   Cost = 500 × level^2.2
#   L1: 500    L10: 79K    L50: 2.73M    L100: 12.6M    L200: 57.7M
#   Total all 200 levels ≈ 3,636M fiber
#
# ── Total max multiplier (all systems fully maxed) ───────────────────────────
#   Base 1 + Upgrades 5,000 + Research 14,000 + Elder 20,000 = 39,001x
#   Displayed as "x39K" — Firefly Bush gives "+9.75M Fiber" per break ✓
# ─────────────────────────────────────────────────────────────────────────────

elder-menu:
  title: "&8Elder Menu"
  size: 36

  filler:
    material: GRAY_STAINED_GLASS_PANE

  top-border:
    material: PURPLE_STAINED_GLASS_PANE

  border:
    material: BLACK_STAINED_GLASS_PANE

  header:
    slot: 4
    material: TOTEM_OF_UNDYING
    name: "&#d4a8ff&l⚗ Elder Council"
    lore:
      - ""
      - "&7Spend &fMaterials &7and &fFiber"
      - "&7for massive permanent bonuses."
      - ""
      - "&8Fiber Amount  · Material Amount"
      - "&8XP Gain       · Material Chance"

  # ── Perk item templates ────────────────────────────────────────────────────
  # Placeholders: {perk}, {level}, {max_level}, {bonus}, {next_bonus}
  #   {fiber_cost}, {driftwood_cost}, {moss_cost}, {reed_cost}, {clover_cost}
  #   {has_fiber}, {has_driftwood}, {has_moss}, {has_reed}, {has_clover}
  #   {has_*} → &#a8ff78✔  or  &#ff7a7a✘

  perk-name:       "&#d4a8ff&l{perk}"
  perk-name-maxed: "&#d4a8ff&l{perk} &#a8ff78[MAX]"

  perk-lore:
    - ""
    - "&7Level: &#d4a8ff{level}&7/&#d4a8ff{max_level}"
    - "&7Current Bonus: &#a8ff78+{bonus}x"
    - "&7Next Level Adds: &#FFD700+{next_bonus}x"
    - ""
    - "&8── Cost to upgrade ──"
    - "&7Fiber:     {has_fiber} &#FFD700{fiber_cost}"
    - "&7Driftwood: {has_driftwood} &#C4A882{driftwood_cost}"
    - "&7Moss:      {has_moss} &#5A8A3C{moss_cost}"
    - "&7Reed:      {has_reed} &#8BC34A{reed_cost}"
    - "&7Clover:    {has_clover} &#2E7D32{clover_cost}"
    - ""
    - "&#d4a8ff▶ Click to purchase!"

  perk-lore-maxed:
    - ""
    - "&7Level: &#a8ff78MAX"
    - "&7Total Bonus: &#a8ff78+{bonus}x"
    - ""
    - "&#a8ff78✔ Fully upgraded!"

  info:
    slot: 31
    material: AMETHYST_SHARD
    name: "&#d4a8ff&lYour Resources"
    lore:
      - ""
      - "&7Fiber:     &#FFD700{fiber}"
      - "&7Driftwood: &#C4A882{driftwood}"
      - "&7Moss:      &#5A8A3C{moss}"
      - "&7Reed:      &#8BC34A{reed}"
      - "&7Clover:    &#2E7D32{clover}"

  close-button:
    slot: 35
    material: BARRIER
    name: "&#ff7a7a&lClose"
    lore:
      - "&7Click to close this menu."

  # ══════════════════════════════════════════════════════════════════════════════
  # Perk definitions
  # ══════════════════════════════════════════════════════════════════════════════

  perks:

    # ── Fiber Amount ──────────────────────────────────────────────────────────
    # 200 levels, flat +100x per level = +20,000x total
    # Every purchase: player sees exactly "+100x added to multiplier" — clean & satisfying
    # Cost = 500 × level^2.2  (same curve as Material Chance upgrade)
    #   L1: 500   L10: 79K   L50: 2.73M   L100: 12.6M   L200: 57.7M
    # Driftwood cost = 5 × level^1.5
    #   L1: 5   L10: 158   L50: 1,768   L100: 5,000   L200: 14,142
    fiber_amount:
      slot: 10
      max-level: 200
      bonus-per-level: 100.0
      fiber-base: 500
      fiber-exponent: 2.2
      driftwood-base: 5
      driftwood-exponent: 1.5
      moss-base: 0
      moss-exponent: 0.0
      reed-base: 0
      reed-exponent: 0.0
      clover-base: 0
      clover-exponent: 0.0

    # ── Material Amount ────────────────────────────────────────────────────────
    # 100 levels, flat +10x per level = +1,000x total
    # Cost = 200 × level^2.0
    #   L1: 200   L10: 20K   L50: 500K   L100: 2M
    material_amount:
      slot: 12
      max-level: 100
      bonus-per-level: 10.0
      fiber-base: 200
      fiber-exponent: 2.0
      driftwood-base: 10
      driftwood-exponent: 1.3
      moss-base: 5
      moss-exponent: 1.3
      reed-base: 2
      reed-exponent: 1.3
      clover-base: 0
      clover-exponent: 0.0

    # ── XP Gain ───────────────────────────────────────────────────────────────
    # 50 levels, flat +5x per level = +250x total
    # Cost = 100 × level^2.0
    xp_gain:
      slot: 14
      max-level: 50
      bonus-per-level: 5.0
      fiber-base: 100
      fiber-exponent: 2.0
      driftwood-base: 5
      driftwood-exponent: 1.2
      moss-base: 3
      moss-exponent: 1.2
      reed-base: 1
      reed-exponent: 1.2
      clover-base: 1
      clover-exponent: 1.1

    # ── Material Chance ────────────────────────────────────────────────────────
    # 25 levels, flat +0.1x per level = +2.5x total
    # Combined with upgrade max (+2x): total chance multi ≈ 5.5x
    # Driftwood 5% × 5.5x = 27.5% max — still not every break ✓
    # Clover 0.1% × 5.5x = 0.55% — very rare ✓
    # Very expensive: prestige sink
    # Cost = 5000 × level^2.2
    material_chance:
      slot: 16
      max-level: 25
      bonus-per-level: 0.1
      fiber-base: 5000
      fiber-exponent: 2.2
      driftwood-base: 100
      driftwood-exponent: 1.5
      moss-base: 50
      moss-exponent: 1.5
      reed-base: 20
      reed-exponent: 1.5
      clover-base: 5
      clover-exponent: 1.5