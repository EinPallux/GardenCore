# Elder Menu Config - Plugin made by Pallux @ BBB ( https://builtbybit.com/members/pallux.34066/ )
# ──────────────────────────────────────────────
# Elder perks are permanent endgame upgrades that cost both
# Fiber and crafting materials. Each level gives a flat multiplier bonus.
#
# Cost formula per level:  round( <material>-base × level^<material>-exponent )
#   A base of 0 means that material is NOT required for that perk.
#
# Lore placeholders:
#   {level}          Current perk level
#   {max_level}      Maximum perk level
#   {bonus}          Total bonus at current level (multiplier units, e.g. 300 = +300x)
#   {next_bonus}     Bonus added by the next level
#   {fiber_cost}     Fiber cost for the next level
#   {driftwood_cost} Driftwood cost (shows 0 if not required)
#   {moss_cost}      Moss cost
#   {reed_cost}      Reed cost
#   {clover_cost}    Clover cost
#   {has_fiber}      ✔ or ✘ depending on whether the player can afford fiber
#   {has_driftwood}  ✔ or ✘
#   {has_moss}       ✔ or ✘
#   {has_reed}       ✔ or ✘
#   {has_clover}     ✔ or ✘
# ──────────────────────────────────────────────

elder-menu:
  title: "&8Elder Council"
  size: 36

  filler:
    material: GRAY_STAINED_GLASS_PANE
  top-border:
    material: PURPLE_STAINED_GLASS_PANE
  border:
    material: BLACK_STAINED_GLASS_PANE

  header:
    slot: 4
    material: TOTEM_OF_UNDYING
    name: "&#d4a8ff&l⚗ Elder Council"
    lore:
      - ""
      - "&7Spend &fFiber &7and &fMaterials &7for"
      - "&7permanent multiplier bonuses."

  # ── Perk item templates ────────────────────────
  perk-name:       "&#d4a8ff&l{perk}"
  perk-name-maxed: "&#d4a8ff&l{perk} &#a8ff78[MAX]"

  perk-lore:
    - ""
    - "&7Level: &#d4a8ff{level}&7/&#d4a8ff{max_level}"
    - "&7Current Bonus: &#a8ff78+{bonus}x"
    - "&7Next Level:    &#FFD700+{next_bonus}x"
    - ""
    - "&8─── Upgrade Cost ───"
    - "&7Fiber:     {has_fiber} &#FFD700{fiber_cost}"
    - "&7Driftwood: {has_driftwood} &#C4A882{driftwood_cost}"
    - "&7Moss:      {has_moss} &#5A8A3C{moss_cost}"
    - "&7Reed:      {has_reed} &#8BC34A{reed_cost}"
    - "&7Clover:    {has_clover} &#2E7D32{clover_cost}"
    - ""
    - "&#d4a8ff▶ Click to purchase!"

  perk-lore-maxed:
    - ""
    - "&7Level: &#a8ff78MAX"
    - "&7Total Bonus: &#a8ff78+{bonus}x"
    - ""
    - "&#a8ff78✔ Fully upgraded!"

  # ── Resource display ───────────────────────────
  info:
    slot: 31
    material: AMETHYST_SHARD
    name: "&#d4a8ff&lYour Resources"
    lore:
      - ""
      - "&7Fiber:     &#FFD700{fiber}"
      - "&7Driftwood: &#C4A882{driftwood}"
      - "&7Moss:      &#5A8A3C{moss}"
      - "&7Reed:      &#8BC34A{reed}"
      - "&7Clover:    &#2E7D32{clover}"

  close-button:
    slot: 35
    material: BARRIER
    name: "&#ff7a7a&lClose"
    lore:
      - "&7Click to close."

  # ════════════════════════════════════════════════
  #  Perk Definitions
  #  Cost formula: round( <mat>-base × level^<mat>-exponent )
  #  bonus-per-level is in multiplier units (e.g. 100.0 = +100x per level)
  # ════════════════════════════════════════════════

  perks:

    # ── Fiber Amount ────────────────────────────
    # 200 levels · +100x per level · max +20,000x total
    # Fiber cost  = 500  × level^2.2   (L1: 500,  L50: 2.73M, L200: 57.7M)
    # Driftwood   = 5    × level^1.5   (L1: 5,    L50: 1,768, L200: 14,142)
    fiber_amount:
      slot: 10
      max-level: 200
      bonus-per-level: 100.0
      fiber-base: 500
      fiber-exponent: 2.2
      driftwood-base: 5
      driftwood-exponent: 1.5
      moss-base: 0
      moss-exponent: 0.0
      reed-base: 0
      reed-exponent: 0.0
      clover-base: 0
      clover-exponent: 0.0

    # ── Material Amount ─────────────────────────
    # 100 levels · +10x per level · max +1,000x total
    # Fiber cost  = 200  × level^2.0
    # Driftwood   = 10   × level^1.3
    # Moss        = 5    × level^1.3
    # Reed        = 2    × level^1.3
    material_amount:
      slot: 12
      max-level: 100
      bonus-per-level: 10.0
      fiber-base: 200
      fiber-exponent: 2.0
      driftwood-base: 10
      driftwood-exponent: 1.3
      moss-base: 5
      moss-exponent: 1.3
      reed-base: 2
      reed-exponent: 1.3
      clover-base: 0
      clover-exponent: 0.0

    # ── XP Gain ─────────────────────────────────
    # 50 levels · +5x per level · max +250x XP multiplier
    # Fiber cost  = 100  × level^2.0
    # Driftwood   = 5    × level^1.2
    # Moss        = 3    × level^1.2
    # Reed        = 1    × level^1.2
    # Clover      = 1    × level^1.1
    xp_gain:
      slot: 14
      max-level: 50
      bonus-per-level: 5.0
      fiber-base: 100
      fiber-exponent: 2.0
      driftwood-base: 5
      driftwood-exponent: 1.2
      moss-base: 3
      moss-exponent: 1.2
      reed-base: 1
      reed-exponent: 1.2
      clover-base: 1
      clover-exponent: 1.1

    # ── Material Chance ─────────────────────────
    # 25 levels · +0.1x per level · max +2.5x chance multiplier
    # Very expensive — prestige sink
    # Fiber cost  = 5000 × level^2.2
    # Driftwood   = 100  × level^1.5
    # Moss        = 50   × level^1.5
    # Reed        = 20   × level^1.5
    # Clover      = 5    × level^1.5
    material_chance:
      slot: 16
      max-level: 25
      bonus-per-level: 0.1
      fiber-base: 5000
      fiber-exponent: 2.2
      driftwood-base: 100
      driftwood-exponent: 1.5
      moss-base: 50
      moss-exponent: 1.5
      reed-base: 20
      reed-exponent: 1.5
      clover-base: 5
      clover-exponent: 1.5