# Research Menu Config - Plugin made by Pallux @ BBB ( https://builtbybit.com/members/pallux.34066/ )
# ──────────────────────────────────────────────
# Research is a sequential unlock system. Players start one research
# at a time, wait for it to complete, then unlock the next.
# Every completed research adds a flat bonus to the player's multipliers.
#
# Cost formula:  base-cost × cost-growth^(research index, 0-based)
#   Research 1  =    500 Fiber
#   Research 5  =  2,210 Fiber
#   Research 10 = 14,167 Fiber
#   Research 28 = ~11.4M Fiber
#
# Duration formula: base-duration-minutes × research number (1-based)
#   Research 1  =  10 min
#   Research 10 = 100 min
#   Research 28 = 280 min (~4h 40m)
#
# Lore placeholders:
#   {fiber_multi}    Cumulative fiber multiplier bonus after this research
#   {material_multi} Cumulative material multiplier bonus after this research
#   {cost}           Fiber cost for this research
#   {time}           Total research duration
#   {time_remaining} Time remaining on the active research
# ──────────────────────────────────────────────

research:
  gui-title: "&8Research"

  total-researches: 28

  # Duration: base × research-number (minutes)
  base-duration-minutes: 10

  # Cost: base-cost × cost-growth^index
  base-cost: 500
  cost-growth: 2.25

  # Flat bonus added to multipliers per completed research
  fiber-amount-per-research: 500.0
  material-amount-per-research: 1.0

  # ── Item display names ─────────────────────────
  name-completed:   "&#a8ff78&l{name} &7[Completed]"
  name-ready:       "&#FFD700&l{name} &e[Click to Start]"
  name-in-progress: "&#FFD700&l{name} &e[In Progress]"
  name-locked:      "&#ff7a7a&l{name} &7[Locked]"

  # ── Lore templates ─────────────────────────────
  lore-completed:
    - ""
    - "&7Fiber Bonus:    &#a8ff78+{fiber_multi}x"
    - "&7Material Bonus: &#a8ff78+{material_multi}x"
    - ""
    - "&#a8ff78✔ Already Researched"

  lore-ready:
    - ""
    - "&7Fiber Bonus After:    &#FFD700+{fiber_multi}x"
    - "&7Material Bonus After: &#FFD700+{material_multi}x"
    - ""
    - "&7Duration: &f{time}"
    - "&7Cost:     &#FFD700{cost} Fiber"
    - ""
    - "&#FFD700▶ Click to start!"

  lore-in-progress:
    - ""
    - "&7Fiber Bonus After:    &#FFD700+{fiber_multi}x"
    - "&7Material Bonus After: &#FFD700+{material_multi}x"
    - ""
    - "&7Time Remaining: &f{time_remaining}"
    - ""
    - "&#FFD700⟳ In progress..."

  lore-locked:
    - ""
    - "&7Fiber Bonus After:    &#ff7a7a+{fiber_multi}x"
    - "&7Material Bonus After: &#ff7a7a+{material_multi}x"
    - ""
    - "&7Duration: &f{time}"
    - "&7Cost:     &#ff7a7a{cost} Fiber"
    - ""
    - "&#ff7a7a✖ Complete previous research first"

  # ── Cancel / empty slot ─────────────────────────
  cancel-name: "&#ff7a7a&lCancel Research"
  cancel-lore:
    - "&7Cancels your active research."
    - "&cYou will lose all progress and the fiber cost!"

  no-research-name: "&7No Active Research"
  no-research-lore:
    - "&7Click any available research to begin."