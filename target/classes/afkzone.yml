# GardenCore AFK Zone Configuration

afkzone:
  enabled: true

  # Reward interval in seconds
  reward-interval: 60

  # Command executed by console when reward triggers. Use %player% for the player's name.
  reward-command: "gems give %player% 1"

  # Title shown while inside the zone. Use {time} for seconds until next reward.
  title: "&#a8ff78&lAFK Zone"
  subtitle: "&#7a7a7a Next Reward in: &#a8ff78{time}s"

  # Action bar messages
  actionbar-enter: "&#a8ff78✦ Entered the AFK Zone"
  actionbar-leave: "&#ff7a7a✦ Left the AFK Zone"

  # Zone bounds (set via /gca afkzone set using a WorldEdit selection)
  zone:
    world: ""
    min-x: 0
    min-y: 0
    min-z: 0
    max-x: 0
    max-y: 0
    max-z: 0