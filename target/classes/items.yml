# GardenCore Items Configuration
# These are special items that execute console commands when right-clicked.
# command: The console command to execute. Use %player% as a placeholder for the player's name.
# lore: Supports color codes and hex colors.

items:
  ticket_fiber_5:
    name: "&#FFD700&lEvent Ticket: &e+5% Fiber"
    material: PAPER
    lore:
      - "&7Right-click to activate a global"
      - "&#FFD700+5% Fiber Amount &7event!"
      - ""
      - "&8Single-use item."
    command: "gca event start fiber_5"

